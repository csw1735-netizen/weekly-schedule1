<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>시간대별 주간 계획표</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주간계획">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="firebase-config.js"></script>
  <script type="module">
    // Firebase SDK 초기화 — 설정이 비어있으면 비활성 모드
    const cfg = window.FIREBASE_CONFIG || {};
    const hasConfig = !!(cfg.apiKey && cfg.projectId && cfg.appId);

    if (hasConfig) {
      const [
        { initializeApp },
        {
          getAuth, GoogleAuthProvider, signInWithPopup, signOut,
          onAuthStateChanged, setPersistence, browserLocalPersistence,
          signInWithEmailAndPassword, createUserWithEmailAndPassword,
          sendPasswordResetEmail, updateProfile,
        },
        { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp },
      ] = await Promise.all([
        import("https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"),
        import("https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js"),
        import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"),
      ]);

      const app = initializeApp(cfg);
      const auth = getAuth(app);
      await setPersistence(auth, browserLocalPersistence).catch(() => {});
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      window.firebaseApi = {
        enabled: true,
        signInWithGoogle: () => signInWithPopup(auth, provider),
        signInWithEmail: (email, password) => signInWithEmailAndPassword(auth, email, password),
        signUpWithEmail: async (email, password, displayName) => {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          if (displayName) {
            try { await updateProfile(cred.user, { displayName }); } catch (_) {}
          }
          return cred;
        },
        resetPassword: (email) => sendPasswordResetEmail(auth, email),
        signOut: () => signOut(auth),
        onAuthChange: (cb) => onAuthStateChanged(auth, cb),
        saveState: async (uid, payload) => {
          await setDoc(doc(db, "users", uid), { state: payload, updatedAt: serverTimestamp() });
        },
        loadState: async (uid) => {
          const snap = await getDoc(doc(db, "users", uid));
          return snap.exists() ? (snap.data().state || null) : null;
        },
        watchState: (uid, cb) => onSnapshot(doc(db, "users", uid), (snap) => {
          if (snap.metadata.hasPendingWrites) return;
          if (snap.exists()) cb(snap.data().state || null);
        }),
      };
    } else {
      window.firebaseApi = { enabled: false };
    }
    window.dispatchEvent(new Event("firebaseReady"));
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #667085;
      --line: #d9dde5;
      --soft: #eef1f5;
      --time: #f7efe4;
      --focus: #2563eb;
      --accent: #0f766e;
      --today: #fff7cc;
      --saturday: #2563eb;
      --sunday: #dc2626;
      --shadow: 0 14px 36px rgba(20, 28, 45, 0.10);
      --head-height: 42px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      padding: 14px 10px;
      font-size: 13px;
    }

    main {
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar,
    .profile {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: end;
      margin-bottom: 8px;
    }

    .profile {
      display: grid;
      grid-template-columns: minmax(180px, 280px) minmax(160px, 220px) minmax(160px, 1fr);
    }

    label span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    button,
    .file-label,
    input,
    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button,
    .file-label {
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    button:hover,
    .file-label:hover {
      border-color: var(--focus);
    }

    input,
    select {
      width: 100%;
      padding: 8px 10px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--focus);
      outline: 3px solid rgba(37, 99, 235, 0.15);
    }

    .file-label input {
      display: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 10px;
      align-items: start;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 158px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      min-width: 700px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 4px;
      vertical-align: top;
      background: #fff;
    }

    /* 1행: 요일 라벨 (상단 0) */
    thead tr.day-row th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--soft);
      text-align: center;
      height: var(--head-height);
      font-size: 13px;
      font-weight: 900;
    }

    /* 시간 코너 셀 (좌상단) */
    thead tr.day-row th:first-child {
      left: 0;
      z-index: 5;
    }

    /* 2행: 하루 목표 행 (헤더 아래 고정) */
    thead tr.goal-row th,
    thead tr.goal-row td {
      position: sticky;
      top: var(--head-height);
      z-index: 3;
      box-shadow: 0 1px 0 var(--line);
    }

    thead tr.goal-row th {
      left: 0;
      width: 66px;
      background: #e8f6f4;
      color: var(--accent);
      text-align: center;
      font-weight: 900;
      vertical-align: middle;
      z-index: 5;
    }

    thead tr.goal-row td {
      background: #f5fbfa;
      color: var(--accent);
      font-weight: 800;
      vertical-align: top;
    }

    thead tr.goal-row td[style*="background"] {
      background-color: inherit;
    }

    /* tbody의 시간 컬럼 (좌측 고정) */
    tbody th {
      position: sticky;
      left: 0;
      z-index: 2;
      width: 66px;
      background: var(--time);
      text-align: center;
      font-weight: 900;
      vertical-align: middle;
    }

    .date {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .today {
      background: var(--today);
    }

    thead th.saturday {
      color: var(--saturday);
    }

    thead th.sunday {
      color: var(--sunday);
    }

    thead tr.goal-row td textarea {
      background: transparent;
      color: var(--accent);
      font-weight: 800;
    }

    td[style] textarea {
      background: transparent;
    }

    textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: #fbfcfe;
      color: var(--ink);
      padding: 5px;
      font: inherit;
      font-size: 12px;
      line-height: 1.3;
      resize: none;
    }

    .cell {
      display: grid;
      gap: 3px;
      min-height: 58px;
    }

    .cell-items {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .cell-item {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #fff;
      padding: 1px 3px 1px 8px;
      font-size: 11px;
      line-height: 1.3;
      max-width: 100%;
    }

    .cell-item-text {
      word-break: keep-all;
      white-space: pre-wrap;
    }

    .cell-item-delete {
      width: 16px;
      height: 16px;
      min-height: 16px;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 50%;
      background: transparent;
      color: #dc2626;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
    }

    .cell-item-delete:hover {
      background: #fee2e2;
      border-color: #dc2626;
    }

    .cell-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 3px;
    }

    .cell-clear {
      width: 20px;
      height: 20px;
      min-height: 20px;
      border: 1px solid rgba(32, 36, 42, 0.18);
      border-radius: 4px;
      background: #fff;
      color: #dc2626;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      visibility: hidden;
    }

    .cell.has-content .cell-clear {
      visibility: visible;
    }

    .cell-clear:hover {
      background: #fee2e2;
      border-color: #dc2626;
    }

    .swatches {
      display: flex;
      gap: 3px;
      justify-content: flex-end;
    }

    .swatch {
      width: 14px;
      height: 14px;
      min-height: 14px;
      border: 1px solid rgba(32, 36, 42, 0.18);
      border-radius: 50%;
      padding: 0;
      background: var(--swatch);
    }

    .swatch.is-selected {
      outline: 2px solid var(--ink);
      outline-offset: 1px;
    }

    .swatch.empty {
      background:
        linear-gradient(135deg, transparent 46%, #dc2626 47%, #dc2626 53%, transparent 54%),
        #fff;
    }

    .status {
      min-height: 22px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .todo-panel {
      position: sticky;
      top: 10px;
      max-height: calc(100vh - 158px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .todo-panel h2 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      font-size: 14px;
      letter-spacing: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .todo-panel h2:hover {
      background: #e6ebf2;
    }

    .todo-panel h2:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: -3px;
    }

    .todo-sort-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      white-space: nowrap;
    }

    .todo-count {
      display: inline-block;
      min-width: 22px;
      padding: 1px 7px;
      margin-left: 4px;
      background: var(--accent);
      color: #fff;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      vertical-align: middle;
    }

    .todo-count.is-zero {
      background: var(--line);
      color: var(--muted);
    }

    .todo-panel textarea {
      min-height: 118px;
      border: 0;
      border-radius: 0;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
      resize: none;
    }

    .todo-items {
      display: grid;
      gap: 6px;
      max-height: calc(100vh - 356px);
      min-height: 120px;
      overflow: auto;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: #fafbfc;
    }

    .todo-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 24px;
      gap: 6px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 7px;
      color: var(--ink);
      font-size: 12px;
      line-height: 1.35;
      cursor: grab;
      user-select: none;
      word-break: keep-all;
      box-shadow: 0 1px 3px rgba(20, 28, 45, 0.06);
    }

    .todo-item:active {
      cursor: grabbing;
    }

    .todo-item-text {
      min-width: 0;
    }

    .todo-delete {
      width: 22px;
      height: 22px;
      min-height: 22px;
      border-radius: 6px;
      padding: 0;
      color: #dc2626;
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
    }

    .todo-delete:hover {
      border-color: #dc2626;
      background: #fee2e2;
    }

    .todo-empty {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    td.drop-ready textarea {
      border-color: var(--focus);
      outline: 3px solid rgba(37, 99, 235, 0.13);
    }

    /* 로그인 모달 */
    .login-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(20, 28, 45, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal[hidden] {
      display: none !important;
    }

    .login-modal-content {
      position: relative;
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 14px;
      padding: 22px 22px 18px;
      box-shadow: 0 24px 60px rgba(20, 28, 45, 0.30);
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }

    .login-modal-content h3 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .login-modal-help {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .login-field {
      display: block;
      margin-bottom: 10px;
    }

    .login-field > span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .login-field input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }

    .login-field input:focus {
      border-color: var(--focus);
      outline: 3px solid rgba(37, 99, 235, 0.15);
    }

    .login-error {
      margin: 4px 0 10px;
      padding: 8px 10px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 7px;
      color: #b91c1c;
      font-size: 12px;
      line-height: 1.4;
    }

    .login-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }

    .login-actions button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .login-actions button.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .login-link {
      display: block;
      margin: 10px 0 0;
      padding: 4px 0;
      background: none;
      border: none;
      color: var(--focus);
      font-size: 12px;
      text-decoration: underline;
      cursor: pointer;
    }

    .login-divider {
      position: relative;
      margin: 16px 0;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .login-divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--line);
      z-index: 0;
    }

    .login-divider span {
      position: relative;
      background: #fff;
      padding: 0 10px;
      z-index: 1;
    }

    .login-google {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .login-google:hover {
      border-color: var(--focus);
    }

    .login-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      border-radius: 50%;
    }

    .login-close:hover {
      background: #f1f3f7;
      color: var(--ink);
    }

    /* Firebase 로그인 영역 */
    .auth-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 6px 10px;
      margin: -4px 0 8px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-size: 12px;
    }

    .auth-status {
      flex: 1;
      color: var(--muted);
      font-weight: 700;
    }

    .auth-status.logged-in {
      color: var(--accent);
    }

    .auth-btn {
      min-height: 32px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
    }

    .auth-btn.auth-login {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .auth-btn.auth-login:hover {
      background: var(--focus);
      border-color: var(--focus);
    }

    .auth-btn.auth-logout:hover {
      border-color: #dc2626;
      color: #dc2626;
    }

    /* ON/OFF 토글 버튼 */
    button.mode-on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.mode-on:hover {
      background: #0d6660;
      border-color: #0d6660;
    }

    button.mode-off {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }

    button.mode-off:hover {
      background: #b91c1c;
      border-color: #b91c1c;
    }

    /* 미리보기 모드: 편집용 UI 감추기 */
    body.preview-mode .subtitle,
    body.preview-mode .profile,
    body.preview-mode .workspace,
    body.preview-mode .status {
      display: none;
    }

    body.preview-mode .toolbar > :not(#offButton) {
      display: none;
    }

    /* 미리보기 화면 — HTML 저장 결과와 유사한 정적 레이아웃 */
    .presentation-view {
      margin-top: 4px;
    }

    .presentation-view[hidden] {
      display: none !important;
    }

    .presentation-view .preview-meta {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .presentation-view .export-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 12px;
      align-items: start;
    }

    .presentation-view .preview-table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .presentation-view table {
      width: 100%;
      min-width: 700px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .presentation-view th,
    .presentation-view td {
      border: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      word-break: keep-all;
      background: #fff;
    }

    .presentation-view thead th {
      text-align: center;
      background: var(--soft);
      font-weight: 900;
    }

    .presentation-view tbody th {
      text-align: center;
      background: var(--time);
      font-weight: 900;
      vertical-align: middle;
      width: 80px;
    }

    .presentation-view .date {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .presentation-view .saturday { color: var(--saturday); }
    .presentation-view .sunday { color: var(--sunday); }

    .presentation-view tr.goal-row th {
      background: #e8f6f4;
      color: var(--accent);
    }

    .presentation-view tr.goal-row td {
      background: #f5fbfa;
      color: var(--accent);
      font-weight: 800;
    }

    .presentation-view ul {
      margin: 0;
      padding-left: 18px;
    }

    .presentation-view li + li {
      margin-top: 5px;
    }

    /* 체크박스 항목 (preview-list) — 기본 list-style 제거 */
    .presentation-view ul.preview-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
      display: grid;
      gap: 4px;
    }

    .presentation-view .preview-item label {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      cursor: pointer;
      word-break: keep-all;
    }

    .presentation-view .preview-item input[type="checkbox"] {
      flex-shrink: 0;
      margin-top: 3px;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .presentation-view .preview-item span {
      flex: 1;
      min-width: 0;
    }

    .presentation-view .preview-item.is-done span {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* 달성률 뱃지 */
    .presentation-view .achieve {
      display: block;
      margin-top: 4px;
      padding: 2px 8px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      border-radius: 10px;
      text-align: center;
    }

    .presentation-view .achieve.achieve-empty {
      background: var(--line);
      color: var(--muted);
    }

    .presentation-view .achieve.achieve-full {
      background: #16a34a;
    }

    .presentation-view .todo-export {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: sticky;
      top: 10px;
    }

    .presentation-view .todo-export h2 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      font-size: 15px;
      cursor: default;
      display: block;
    }

    .presentation-view .todo-export ul {
      padding: 12px 16px 12px 28px;
    }

    @media (max-width: 780px) {
      body {
        padding: 12px 8px;
      }

      .profile {
        grid-template-columns: 1fr;
      }

      button,
      .file-label {
        flex: 1 1 135px;
      }

      .table-wrap {
        max-height: calc(100vh - 260px);
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .todo-panel {
        position: static;
        max-height: none;
      }

      .todo-panel textarea {
        min-height: 150px;
      }

      .todo-items {
        max-height: none;
      }

      /* 미리보기(ON) 화면도 모바일에서는 세로로 쌓기 */
      .presentation-view .export-grid {
        grid-template-columns: 1fr;
      }

      .presentation-view .todo-export {
        position: static;
        top: auto;
      }

      .presentation-view table {
        min-width: 560px;
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .toolbar,
      .profile,
      .status {
        display: none;
      }

      .workspace {
        display: block;
      }

      .table-wrap {
        max-height: none;
        overflow: visible;
        border: 0;
        box-shadow: none;
      }

      thead th,
      tbody th {
        position: static;
      }

      textarea {
        min-height: 36px;
        border: 0;
        background: transparent;
        resize: none;
      }

      .swatches {
        display: none;
      }

      .todo-panel {
        margin-top: 14px;
        max-height: none;
        box-shadow: none;
        break-inside: avoid;
      }

      .todo-panel textarea {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="auth-bar" id="authBar" hidden>
      <span class="auth-status" id="authStatus">로그인하면 PC ↔ 폰이 자동 동기화됩니다</span>
      <button id="loginButton" class="auth-btn auth-login" type="button">로그인</button>
      <button id="logoutButton" class="auth-btn auth-logout" type="button" hidden>로그아웃</button>
    </div>
    <h1>시간대별 주간 계획표</h1>
    <p class="subtitle">하루 목표와 시간대별 일정을 입력하면 브라우저에 자동 저장됩니다.</p>

    <section class="profile" aria-label="기본 정보">
      <label>
        <span>이름</span>
        <input id="personName" type="text" autocomplete="name" placeholder="이름">
      </label>
      <label>
        <span>주 시작일</span>
        <input id="weekStart" type="date">
      </label>
      <label>
        <span>시간 범위</span>
        <select id="timePreset">
          <option value="day">하루형 06:00-23:00</option>
          <option value="work">업무형 08:00-20:00</option>
          <option value="school">등교형 07:00-22:00</option>
          <option value="simple">간략형 오전/오후/저녁</option>
        </select>
      </label>
    </section>

    <div class="toolbar">
      <button class="primary" id="saveJsonButton" type="button">JSON 저장</button>
      <button id="saveHtmlButton" type="button">HTML 저장</button>
      <button id="printButton" type="button">인쇄</button>
      <button id="notifyTodayButton" type="button" title="오늘 일정을 폰 알림으로 띄움">🔔 오늘 알림</button>
      <button id="onButton" class="mode-on" type="button" title="미리보기 모드로 전환">ON</button>
      <button id="offButton" class="mode-off" type="button" hidden title="편집 모드로 돌아가기">OFF</button>
    </div>

    <div class="workspace">
      <div class="table-wrap" aria-label="시간대별 주간 계획표">
        <table>
          <thead id="scheduleHead"></thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
      <aside class="todo-panel" aria-label="To do list">
        <h2 id="todoHeading" role="button" tabindex="0" title="클릭하면 정렬을 바꿉니다">
          <span class="todo-heading-title">To do list <span class="todo-count" id="todoCount" aria-label="총 항목 수">0</span></span>
          <span class="todo-sort-label" id="todoSortLabel">입력 순</span>
        </h2>
        <textarea id="todoList" placeholder="할 일을 줄마다 입력"></textarea>
        <div class="todo-items" id="todoItems" aria-label="드래그 가능한 To do 목록"></div>
      </aside>
    </div>
    <p class="status" id="status" role="status"></p>
    <section id="presentationView" class="presentation-view" aria-label="미리보기" hidden></section>

    <div id="loginModal" class="login-modal" role="dialog" aria-labelledby="loginModalTitle" aria-modal="true" hidden>
      <div class="login-modal-content">
        <h3 id="loginModalTitle">로그인 또는 회원가입</h3>
        <p class="login-modal-help">이메일·비밀번호로 가입하거나 Google 계정으로 로그인할 수 있어요. 가족마다 따로 가입하면 각자 자신의 일정만 보입니다.</p>
        <label class="login-field">
          <span>이메일</span>
          <input id="loginEmail" type="email" autocomplete="email" placeholder="name@example.com">
        </label>
        <label class="login-field">
          <span>비밀번호 (6자 이상)</span>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••">
        </label>
        <label class="login-field login-field-name" hidden>
          <span>표시할 이름 (선택)</span>
          <input id="loginDisplayName" type="text" autocomplete="nickname" placeholder="홍길동">
        </label>
        <p class="login-error" id="loginError" role="alert" hidden></p>
        <div class="login-actions">
          <button id="emailLoginButton" type="button" class="primary">로그인</button>
          <button id="emailSignupButton" type="button">새 계정 만들기</button>
        </div>
        <button id="forgotPasswordButton" type="button" class="login-link">비밀번호 잊으셨나요?</button>
        <div class="login-divider"><span>또는</span></div>
        <button id="googleLoginButton" type="button" class="login-google">Google 계정으로 로그인</button>
        <button id="closeLoginButton" type="button" class="login-close" aria-label="닫기">✕</button>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "weeklyTimeScheduleState.v3";
    const OLD_KEYS = ["weeklyTimeScheduleState.v2"];
    const days = ["월", "화", "수", "목", "금", "토", "일"];
    const colors = ["", "#fef3c7", "#dcfce7", "#dbeafe", "#fae8ff", "#fee2e2"];
    const presets = {
      day: { start: 6, end: 23 },
      work: { start: 8, end: 20 },
      school: { start: 7, end: 22 },
      simple: { type: "labels", labels: ["오전", "오후", "저녁"] }
    };
    const SORT_STATES = ["none", "asc", "desc"];
    const SORT_LABELS = { none: "입력 순", asc: "↑ 오름차순", desc: "↓ 내림차순" };

    const defaultState = {
      version: 3,
      personName: "",
      weekStart: getNextMondayIso(new Date()),
      timePreset: "day",
      goals: ["", "", "", "", "", "", ""],
      goalColors: ["", "", "", "", "", "", ""],
      schedule: {},
      colors: {},
      todoList: "",
      todoSort: "none",
      done: {}
    };

    const clone = (value) => JSON.parse(JSON.stringify(value));
    let state = loadSavedState();

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function getMonday(date) {
      const target = new Date(date);
      const day = target.getDay();
      const mondayOffset = day === 0 ? -6 : 1 - day;
      target.setHours(0, 0, 0, 0);
      target.setDate(target.getDate() + mondayOffset);
      return target;
    }

    function getMondayIso(date) {
      const monday = getMonday(date);
      return toIsoDate(monday);
    }

    function getNextMondayIso(date) {
      const monday = getMonday(date);
      monday.setDate(monday.getDate() + 7);
      return toIsoDate(monday);
    }

    function toIsoDate(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function parseIsoDate(value) {
      const [year, month, date] = String(value || "").split("-").map(Number);
      if (!year || !month || !date) {
        return getMonday(new Date());
      }
      return new Date(year, month - 1, date);
    }

    function getWeekDays() {
      const monday = parseIsoDate(state.weekStart);
      return days.map((day, index) => {
        const date = new Date(monday);
        date.setDate(monday.getDate() + index);
        return {
          day,
          iso: toIsoDate(date),
          label: `${date.getMonth() + 1}/${date.getDate()}`
        };
      });
    }

    function getTimes() {
      const preset = presets[state.timePreset] || presets.day;
      if (preset.type === "labels") {
        return preset.labels.slice();
      }
      const times = [];
      for (let hour = preset.start; hour <= preset.end; hour += 1) {
        times.push(`${pad(hour)}:00`);
      }
      return times;
    }

    function loadSavedState() {
      const saved = localStorage.getItem(STORAGE_KEY) || OLD_KEYS.map((key) => localStorage.getItem(key)).find(Boolean);
      if (!saved) {
        return clone(defaultState);
      }

      try {
        return normalizeState(JSON.parse(saved));
      } catch {
        return clone(defaultState);
      }
    }

    function normalizeState(value) {
      const next = clone(defaultState);
      next.personName = String(value.personName || "");
      next.weekStart = value.weekStart || getNextMondayIso(new Date());
      next.timePreset = presets[value.timePreset] ? value.timePreset : "day";
      if (Array.isArray(value.goals)) {
        next.goals = days.map((_, index) => String(value.goals[index] || ""));
      }
      if (Array.isArray(value.goalColors)) {
        next.goalColors = days.map((_, index) => normalizeColor(value.goalColors[index]));
      }
      next.todoList = String(value.todoList || "");
      next.todoSort = SORT_STATES.includes(value.todoSort) ? value.todoSort : "none";
      if (value.done && typeof value.done === "object" && !Array.isArray(value.done)) {
        next.done = Object.fromEntries(
          Object.entries(value.done).filter(([, v]) => v === true)
        );
      }
      if (value.schedule && typeof value.schedule === "object" && !Array.isArray(value.schedule)) {
        next.schedule = Object.fromEntries(
          Object.entries(value.schedule).map(([key, cell]) => [key, String(cell || "")])
        );
      }
      if (value.colors && typeof value.colors === "object" && !Array.isArray(value.colors)) {
        next.colors = Object.fromEntries(
          Object.entries(value.colors).map(([key, color]) => [key, normalizeColor(color)]).filter(([, color]) => color)
        );
      }
      return next;
    }

    function normalizeColor(value) {
      const color = String(value || "");
      return colors.includes(color) ? color : "";
    }

    function cellKey(time, colIndex) {
      return `${time}|${colIndex}`;
    }

    function render() {
      const weekDays = getWeekDays();
      const todayIso = toIsoDate(new Date());

      const dayRow = `
        <tr class="day-row">
          <th scope="col">시간</th>
          ${weekDays.map((item, index) => `
            <th scope="col" class="${getDayClass(index)} ${item.iso === todayIso ? "today" : ""}">
              ${item.day}<span class="date">${item.label}</span>
            </th>
          `).join("")}
        </tr>
      `;

      const goalRow = `
        <tr class="goal-row">
          <th scope="row">하루 목표</th>
          ${weekDays.map((item, colIndex) => {
            const value = state.goals[colIndex] || "";
            return `
              <td class="${item.iso === todayIso ? "today" : ""}" style="${cellStyle(state.goalColors[colIndex])}">
                <div class="cell ${value.trim() ? "has-content" : ""}">
                  <textarea data-goal-col="${colIndex}" aria-label="${item.day}요일 하루 목표" placeholder="오늘 꼭 할 일">${escapeTextarea(value)}</textarea>
                  <div class="cell-actions">
                    <button class="cell-clear" type="button" data-clear-goal="${colIndex}" title="이 칸 비우기" aria-label="${item.day}요일 하루 목표 비우기">×</button>
                    ${makeSwatches("goal", colIndex, state.goalColors[colIndex])}
                  </div>
                </div>
              </td>
            `;
          }).join("")}
        </tr>
      `;

      document.getElementById("scheduleHead").innerHTML = dayRow + goalRow;

      const rows = getTimes().map((time) => `
        <tr>
          <th scope="row">${time}</th>
          ${weekDays.map((item, colIndex) => {
            const key = cellKey(time, colIndex);
            const value = state.schedule[key] || "";
            return `
              <td class="${item.iso === todayIso ? "today" : ""}" style="${cellStyle(state.colors[key])}">
                <div class="cell ${value.trim() ? "has-content" : ""}">
                  <textarea data-time="${time}" data-col="${colIndex}" data-drop-target="schedule" aria-label="${item.day}요일 ${time}" placeholder="일정 입력">${escapeTextarea(value)}</textarea>
                  ${renderCellItems(key, value)}
                  <div class="cell-actions">
                    <button class="cell-clear" type="button" data-clear-schedule="${escapeHtml(key)}" title="이 칸 전체 비우기" aria-label="${item.day}요일 ${time} 전체 비우기">×</button>
                    ${makeSwatches("schedule", key, state.colors[key])}
                  </div>
                </div>
              </td>
            `;
          }).join("")}
        </tr>
      `).join("");

      document.getElementById("scheduleBody").innerHTML = rows;
      document.getElementById("personName").value = state.personName;
      document.getElementById("weekStart").value = state.weekStart;
      document.getElementById("timePreset").value = state.timePreset;
      document.getElementById("todoList").value = state.todoList;
      document.getElementById("todoSortLabel").textContent = SORT_LABELS[state.todoSort] || SORT_LABELS.none;
      renderTodoItems();
      bindInputs();
    }

    function cellStyle(color) {
      return color ? `background:${color}` : "";
    }

    function makeSwatches(type, key, selectedColor) {
      return `
        <div class="swatches" aria-label="색상 선택">
          ${colors.map((color) => `
            <button
              class="swatch ${color ? "" : "empty"} ${color === selectedColor ? "is-selected" : ""}"
              type="button"
              title="${color ? "색상 적용" : "색상 지우기"}"
              aria-label="${color ? "색상 적용" : "색상 지우기"}"
              data-color-type="${type}"
              data-color-key="${escapeHtml(key)}"
              data-color="${color}"
              style="--swatch:${color || "#fff"}"
            ></button>
          `).join("")}
        </div>
      `;
    }

    function getDayClass(index) {
      if (index === 5) {
        return "saturday";
      }
      if (index === 6) {
        return "sunday";
      }
      return "";
    }

    function syncCellContentFlag(textarea) {
      const cell = textarea.closest(".cell");
      if (cell) {
        cell.classList.toggle("has-content", !!textarea.value.trim());
      }
    }

    function renderCellItems(key, value) {
      const lines = String(value || "").split(/\r?\n/);
      const html = lines
        .map((line, idx) => ({ text: line, idx }))
        .filter((entry) => entry.text.trim())
        .map((entry) => `
          <li class="cell-item">
            <span class="cell-item-text">${escapeHtml(entry.text)}</span>
            <button class="cell-item-delete" type="button" data-cell-item-key="${escapeHtml(key)}" data-line-index="${entry.idx}" title="이 항목만 삭제" aria-label="${escapeHtml(entry.text)} 삭제">×</button>
          </li>
        `)
        .join("");
      return html ? `<ul class="cell-items" aria-label="입력된 항목 목록">${html}</ul>` : "";
    }

    function refreshCellItems(textarea) {
      const cell = textarea.closest(".cell");
      if (!cell) return;
      const key = cellKey(textarea.dataset.time, Number(textarea.dataset.col));
      const newHtml = renderCellItems(key, textarea.value);
      const old = cell.querySelector(".cell-items");
      if (newHtml && old) {
        old.outerHTML = newHtml;
      } else if (newHtml && !old) {
        textarea.insertAdjacentHTML("afterend", newHtml);
      } else if (!newHtml && old) {
        old.remove();
      }
      bindCellItemDeletes(cell);
    }

    function bindCellItemDeletes(scope) {
      scope.querySelectorAll(".cell-item-delete").forEach((button) => {
        if (button._bound) return;
        button._bound = true;
        button.addEventListener("click", () => {
          deleteScheduleLine(button.dataset.cellItemKey, Number(button.dataset.lineIndex));
        });
      });
    }

    function deleteScheduleLine(key, lineIndex) {
      const [time, colStr] = key.split("|");
      const textarea = document.querySelector(`[data-time="${time}"][data-col="${colStr}"]`);
      if (!textarea) return;
      const lines = textarea.value.split(/\r?\n/);
      if (lineIndex < 0 || lineIndex >= lines.length) return;
      lines.splice(lineIndex, 1);
      const newValue = lines.join("\n").replace(/\n{2,}/g, "\n").replace(/^\n+|\n+$/g, "");
      textarea.value = newValue;
      if (newValue) {
        state.schedule[key] = newValue;
      } else {
        delete state.schedule[key];
      }
      syncCellContentFlag(textarea);
      refreshCellItems(textarea);
      remember("일정 항목 한 줄을 삭제했습니다.");
    }

    function bindInputs() {
      document.querySelectorAll("[data-goal-col]").forEach((textarea) => {
        textarea.addEventListener("input", () => {
          state.goals[Number(textarea.dataset.goalCol)] = textarea.value;
          syncCellContentFlag(textarea);
          remember();
        });
      });

      document.querySelectorAll("[data-time][data-col]").forEach((textarea) => {
        textarea.addEventListener("input", () => {
          const key = cellKey(textarea.dataset.time, Number(textarea.dataset.col));
          state.schedule[key] = textarea.value;
          syncCellContentFlag(textarea);
          refreshCellItems(textarea);
          remember();
        });
      });

      bindCellItemDeletes(document);

      document.querySelectorAll("[data-clear-goal]").forEach((button) => {
        button.addEventListener("click", () => {
          const colIndex = Number(button.dataset.clearGoal);
          state.goals[colIndex] = "";
          const textarea = document.querySelector(`[data-goal-col="${colIndex}"]`);
          if (textarea) {
            textarea.value = "";
            syncCellContentFlag(textarea);
          }
          remember("하루 목표 칸을 비웠습니다.");
        });
      });

      document.querySelectorAll("[data-clear-schedule]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.clearSchedule;
          delete state.schedule[key];
          const [time, colStr] = key.split("|");
          const textarea = document.querySelector(`[data-time="${time}"][data-col="${colStr}"]`);
          if (textarea) {
            textarea.value = "";
            syncCellContentFlag(textarea);
            refreshCellItems(textarea);
          }
          remember("시간표 칸을 비웠습니다.");
        });
      });

      document.getElementById("todoList").oninput = (event) => {
        state.todoList = event.target.value;
        renderTodoItems();
        remember();
      };

      bindDropTargets();

      document.querySelectorAll("[data-color-type][data-color-key]").forEach((button) => {
        button.addEventListener("click", () => {
          const color = normalizeColor(button.dataset.color);
          if (button.dataset.colorType === "goal") {
            state.goalColors[Number(button.dataset.colorKey)] = color;
          } else {
            state.colors[button.dataset.colorKey] = color;
            if (!color) {
              delete state.colors[button.dataset.colorKey];
            }
          }
          remember("칸 색상을 저장했습니다.");
          render();
        });
      });
    }

    function getTodoItems() {
      const seen = new Set();
      const items = state.todoList
        .split(/\r?\n/)
        .map((item) => item.trim())
        .filter(Boolean)
        .filter((item) => {
          const key = item.toLowerCase();
          if (seen.has(key)) {
            return false;
          }
          seen.add(key);
          return true;
        });

      const sort = state.todoSort || "none";
      if (sort === "asc") {
        items.sort((a, b) => a.localeCompare(b, "ko"));
      } else if (sort === "desc") {
        items.sort((a, b) => b.localeCompare(a, "ko"));
      }
      return items;
    }

    function cycleTodoSort() {
      const cur = state.todoSort || "none";
      const next = SORT_STATES[(SORT_STATES.indexOf(cur) + 1) % SORT_STATES.length];
      state.todoSort = next;
      document.getElementById("todoSortLabel").textContent = SORT_LABELS[next];
      renderTodoItems();

      const todoItems = document.getElementById("todoItems");

      if (countEl) {
        countEl.textContent = items.length;
        countEl.classList.toggle("is-zero", items.length === 0);

      if (!items.length) {
        todoItems.innerHTML = `<p class="todo-empty">To do list에 줄마다 입력하면 여기에서 끌어다 시간표에 놓을 수 있습니다.</p>`;
        return;
      }

      todoItems.innerHTML = items.map((item, index) => `

        </div>
      `).join("");

      todoItems.querySelectorAll("[draggable='true']").forEach((item) => {
        item.addEventListener("dragstart", (event) => {
          event.dataTransfer.setData("text/plain", item.querySelector(".todo-item-text").textContent.trim());
          event.dataTransfer.effectAllowed = "copy";
        });
      });

      todoItems.querySelectorAll("[data-delete-todo]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteTodoItem(Number(button.dataset.deleteTodo));

          event.preventDefault();

        });

      const items = getTodoItems();
      items.splice(index, 1);

    function bindDropTargets() {
      document.querySelectorAll("[data-drop-target='schedule']").forEach((textarea) => {
        const cell = textarea.closest("td");
        textarea.addEventListener("dragover", (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "copy";
          cell.classList.add("drop-ready");
        });
        textarea.addEventListener("dragleave", () => {
          cell.classList.remove("drop-ready");
        });
        textarea.addEventListener("drop", (event) => {
          event.preventDefault();
          cell.classList.remove("drop-ready");
          const text = event.dataTransfer.getData("text/plain").trim();
          if (!text) {
            return;
          }
          const key = cellKey(textarea.dataset.time, Number(textarea.dataset.col));
          const current = state.schedule[key] || "";
          state.schedule[key] = current ? `${current}\n${text}` : text;
          textarea.value = state.schedule[key];
          syncCellContentFlag(textarea);
          refreshCellItems(textarea);
          remember("To do 항목을 시간표에 추가했습니다.");
        });
      });
    }

    function formatItemsWithDone(value, cellId) {
      const items = splitItems(value);
      if (!items.length) return "";
      return `<ul class="preview-list">${items
        .map((item) => {
          const key = makeDoneKey(cellId, item);

            </label>

    function calculateAchievement(colIndex) {
      // 하루 목표는 달성률 계산에서 제외하고, 시간대 일정만 합산한다.
      let total = 0;
      let done = 0;
      for (const time of getTimes()) {
        const key = cellKey(time, colIndex);
        const items = splitItems(state.schedule[key]);
        items.forEach((item) => {
          total += 1;
          if (state.done && state.done[makeDoneKey(key, item)]) {
            done += 1;
          }
        });
      }
      return { total, done };
    }

    function achievementText(done, total) {
      const pct = Math.round((done / total) * 100);
      return `${done}/${total}(${pct}%)`;
    }

    function formatAchievement(colIndex) {
      const { total, done } = calculateAchievement(colIndex);
      if (total === 0) return `<span class="achieve achieve-empty" data-col="${colIndex}">—</span>`;
      const cls = done === total ? "achieve achieve-full" : "achieve";
      return `<span class="${cls}" data-col="${colIndex}">${achievementText(done, total)}</span>`;
    }

    function refreshAchievementRates() {
      for (let colIndex = 0; colIndex < 7; colIndex += 1) {
        const { total, done } = calculateAchievement(colIndex);
        const el = document.querySelector(`#presentationView .achieve[data-col="${colIndex}"]`);
        if (!el) continue;
        if (total === 0) {
          el.textContent = "—";
          el.classList.add("achieve-empty");
          el.classList.remove("achieve-full");
        } else {
          el.textContent = achievementText(done, total);
          el.classList.remove("achieve-empty");
          el.classList.toggle("achieve-full", done === total);
        }
      }
    }

    function getTodayColIndex() {
      const weekStart = parseIsoDate(state.weekStart);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      weekStart.setHours(0, 0, 0, 0);
      const diff = Math.floor((today - weekStart) / (24 * 3600 * 1000));
      return diff >= 0 && diff <= 6 ? diff : -1;
    }

    function buildTodayDigest() {
      const todayCol = getTodayColIndex();
      if (todayCol === -1) {
        return {
          title: "주간 계획",
          body: "현재 주에 오늘이 포함되지 않았습니다. '이번 주' 버튼을 눌러주세요.",
        };
      }

      const dayName = days[todayCol] + "요일";
      const goal = String(state.goals[todayCol] || "").trim();
      const nowHour = new Date().getHours();
      const preset = presets[state.timePreset] || presets.day;
      const isLabelPreset = preset.type === "labels";

      const items = [];
      for (const time of getTimes()) {
        const key = cellKey(time, todayCol);
        const raw = String(state.schedule[key] || "").trim();
        if (!raw) continue;
        const summary = raw.split(/\r?\n/).map(s => s.trim()).filter(Boolean).join(", ");
        const hour = isLabelPreset ? null : parseInt(time.slice(0, 2), 10);
        items.push({ hour, time, summary });
      }

      let lines;
      if (isLabelPreset) {
        lines = items.length
          ? items.map(i => `${i.time}: ${i.summary}`)
          : ["오늘 등록된 일정 없음"];
      } else {
        const upcoming = items.filter(i => i.hour >= nowHour).slice(0, 5);
        lines = upcoming.length
          ? upcoming.map(i => `${i.time} ${i.summary}`)
          : items.length
            ? [`오늘 ${items.length}개 일정 완료`]
            : ["오늘 등록된 일정 없음"];
      }

      const title = goal
        ? `🎯 ${dayName}: ${goal}`
        : `${dayName} 일정`;

      return { title, body: lines.join("\n") };
    }

    async function showTodayNotification() {
      if (!("Notification" in window)) {

        return;
      }

      let permission = Notification.permission;
      if (permission === "default") {
        permission = await Notification.requestPermission();
      }
      if (permission !== "granted") {
        alert("알림 권한이 거부되었습니다.\n폰 설정 > 앱 > 주간계획 > 알림에서 허용으로 바꿔주세요.");
        return;
      }

      const { title, body } = buildTodayDigest();
      const options = {
        body,
        icon: "icon.svg",
        badge: "icon.svg",
        tag: "daily-schedule",
        renotify: true,
        requireInteraction: true,
        lang: "ko",
        dir: "ltr",
      };

      try {
        if ("serviceWorker" in navigator) {
          const reg = await navigator.serviceWorker.ready;
          await reg.showNotification(title, options);
        } else {
          new Notification(title, options);
        }
        document.getElementById("status").textContent = "오늘 일정을 알림으로 띄웠습니다. 잠금화면을 확인해보세요.";
      } catch (err) {

      }
    }

    function setupFirebaseAuth() {

      authBar.hidden = false;

        const { email, password } = readLoginInputs();
        if (!email || !password) {
          showLoginError("이메일과 비밀번호를 모두 입력해 주세요.");
          return;
        }
        try {
          await api.signInWithEmail(email, password);
          closeLoginModal();
        } catch (err) {
          showLoginError(translateAuthError(err));
        }
      });

      // 이메일 회원가입
      document.getElementById("emailSignupButton").addEventListener("click", async () => {
        hideLoginError();
        const nameField = document.querySelector(".login-field-name");
        if (nameField.hidden) {
          // 처음 누르면 이름 입력칸을 보여주고 안내만
          nameField.hidden = false;
          showLoginError("표시할 이름을 입력하고 다시 '새 계정 만들기'를 눌러주세요. (이름은 비워둬도 됩니다)");
          document.getElementById("loginDisplayName").focus();
          return;
        }
        const { email, password, displayName } = readLoginInputs();
        if (!email || !password) {
          showLoginError("이메일과 비밀번호를 모두 입력해 주세요.");
          return;
        }
        if (password.length < 6) {
          showLoginError("비밀번호는 6자 이상이어야 합니다.");
          return;
        }
        try {
          await api.signUpWithEmail(email, password, displayName);
          closeLoginModal();
        } catch (err) {
          showLoginError(translateAuthError(err));
        }
      });

      // Google 로그인
      document.getElementById("googleLoginButton").addEventListener("click", async () => {
        hideLoginError();
        try {
          await api.signInWithGoogle();
          closeLoginModal();
        } catch (err) {
          showLoginError(translateAuthError(err));
        }
      });

      // 비밀번호 재설정
      document.getElementById("forgotPasswordButton").addEventListener("click", async () => {
        hideLoginError();
        const { email } = readLoginInputs();
        if (!email) {
          showLoginError("재설정 메일을 받을 이메일을 위에 입력해 주세요.");
          return;
        }
        try {
          await api.resetPassword(email);
          showLoginError(`재설정 메일을 ${email}로 보냈습니다. 받은편지함을 확인해 주세요.`);
        } catch (err) {
          showLoginError(translateAuthError(err));
        }
      });

      // 로그아웃
      logoutBtn.addEventListener("click", () => {
        if (!confirm("로그아웃하시겠습니까? 다른 계정으로 로그인하면 그 계정의 데이터가 표시됩니다.")) return;
        api.signOut();
      });

      // 인증 상태 변경 처리
      api.onAuthChange(async (user) => {
        const wasLoggedIn = currentUser !== null;
        if (user) {
          currentUser = user;
          loginBtn.hidden = true;
          logoutBtn.hidden = false;
          statusEl.classList.add("logged-in");
          statusEl.textContent = `👤 ${user.displayName || user.email || "로그인됨"}`;

          try {
            const cloudState = await api.loadState(user.uid);
            suspendCloudSave = true;
            if (cloudState) {
              state = normalizeState(cloudState);
              render();
              document.getElementById("status").textContent = "클라우드에서 데이터를 불러왔습니다.";
            } else {
              suspendCloudSave = false;
              await api.saveState(user.uid, state);
              document.getElementById("status").textContent = "새 계정에 데이터를 저장했습니다.";
            }
            suspendCloudSave = false;
          } catch (err) {
            console.warn("클라우드 초기 동기화 실패:", err);
          }

          if (cloudUnsubscribe) cloudUnsubscribe();
          cloudUnsubscribe = api.watchState(user.uid, (remoteState) => {
            if (!remoteState) return;
            suspendCloudSave = true;
            state = normalizeState(remoteState);
            render();
            document.getElementById("status").textContent = "다른 기기의 변경사항이 반영되었습니다.";
            suspendCloudSave = false;
          });
        } else {
          currentUser = null;
          loginBtn.hidden = false;
          logoutBtn.hidden = true;
          statusEl.classList.remove("logged-in");
          statusEl.textContent = "로그인하면 PC ↔ 폰이 자동 동기화됩니다";
          if (cloudUnsubscribe) {
            cloudUnsubscribe();
            cloudUnsubscribe = null;
          }
          // 명시적 로그아웃 시 이전 사용자 데이터가 화면에 남지 않도록 초기화
          if (wasLoggedIn) {
            suspendCloudSave = true;
            state = clone(defaultState);
            localStorage.removeItem(STORAGE_KEY);
            render();
            suspendCloudSave = false;
            document.getElementById("status").textContent = "로그아웃되었습니다. 다른 계정으로 로그인할 수 있어요.";
          }
        }
      });
    }

    if (window.firebaseApi !== undefined) {
      setupFirebaseAuth();
    } else {
      window.addEventListener("firebaseReady", setupFirebaseAuth, { once: true });
    }

    // PWA: service worker 등록 (HTTPS 또는 localhost에서만 동작)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("service-worker.js")
          .catch((err) => console.warn("Service worker 등록 실패:", err));
      });
    }
  </script>
</body>
</html>
